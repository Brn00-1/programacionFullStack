<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="juego.js"></script>
    <link rel="stylesheet" href="style12.css">

    <title>Trivia Uruguay</title>
</head>

<body>

    <div class="container game-container">

        <div class="card shadow-lg p-4">

            <h1 class="text-center mb-4">
                🇺🇾 Trivia Uruguaya
            </h1>

            <h3 id="pregunta">
                ¿Cuál es la capital de Uruguay?
            </h3>

            <div class="d-grid gap-3 mt-4">

                <button class="btn opcion" onclick="verificar('A')">
                    A) Montevideo
                </button>

                <button class="btn opcion" onclick="verificar('B')">
                    B) Buenos Aires
                </button>

                <button class="btn opcion" onclick="verificar('C')">
                    C) Asunción
                </button>

                <button class="btn opcion" onclick="verificar('D')">
                    D) Santiago
                </button>

            </div>

            <div class="text-center mt-4">

                <h4 id="resultado"></h4>

                <h5 class="mt-3">
                    Puntaje:
                    <span id="puntaje">0</span>
                </h5>

            </div>

            <div class="text-center mt-4">
                <button class="btn btn-warning" onclick="siguientePregunta()">
                    Siguiente Pregunta
                </button>
            </div>

        </div>

    </div>

    <script src="juego.js"></script>

</body>

</html>
