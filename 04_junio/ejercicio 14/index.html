<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Gatos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Galería de Gatos</h1>

    <button id="btnGato">Traer gato</button>

    <div class="contenedor-imagen">
        <img id="imagenGato" src="" alt="Imagen de gato">
    </div>

    <div class="botones">
        <button id="btnLike">Me gusta</button>
        <button id="btnDislike">No me gusta</button>
    </div>

    <div class="contadores">
        <p> Me gusta: <span id="likes">0</span></p>
        <p> No me gusta: <span id="dislikes">0</span></p>
    </div>

    <p id="mensaje"></p>

    <script src="script.js"></script>

</body>
</html>
